services:
  - type: web
    name: sebas-barber-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://sebasbarber.netlify.app
      - key: ADMIN_DEFAULT_PASSWORD
        sync: false
      - key: MASTER_RESET_CODE
        sync: false
      - key: GOOGLE_CALENDAR_ID
        value: sebasbarberg2021@gmail.com
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: CALENDAR_ENABLED
        value: "true"
      - key: CALENDAR_REQUIRED
        value: "true"
      - key: APPOINTMENT_BUFFER_MIN
        value: "0"
