services:
  - type: web
    name: sebas-barber-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://barberiasebas.netlify.app
      - key: ADMIN_DEFAULT_PASSWORD
        sync: false

